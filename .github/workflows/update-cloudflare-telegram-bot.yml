name: Update Cloudflare Telegram Bot

on:
  workflow_dispatch:
    inputs:
      notify_broadcast:
        description: "Send subscriber broadcast after refresh"
        required: false
        default: "false"
        type: string
  schedule:
    - cron: "15 22 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AI_ALLOW_FALLBACK_NO_API: "1"

jobs:
  refresh-snapshot-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Recompute current rebalance before export
        run: python src/main.py --rebalance-us

      - name: Export latest strategy snapshot
        run: python scripts/export_cloudflare_bot_data.py

      - name: Sync latest snapshot to Cloudflare Worker
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $BOT_NOTIFY_TOKEN" \
            -H "Content-Type: application/json" \
            --data @cloudflare/telegram-bot/live/snapshot.json \
            https://autostock-telegram-bot.th07290828.workers.dev/api/snapshot-sync
        env:
          BOT_NOTIFY_TOKEN: ${{ secrets.BOT_NOTIFY_TOKEN }}

      - name: Verify deployed snapshot endpoint
        run: |
          curl --fail --silent --show-error \
            https://autostock-telegram-bot.th07290828.workers.dev/api/snapshot \
            > /tmp/snapshot.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("/tmp/snapshot.json").read_text(encoding="utf-8"))
          assert "strategies" in payload
          assert "rebalance" in payload
          assert payload["rebalance"]["v4"]["latestMarketDay"], "rebalance snapshot missing latestMarketDay"
          print("Snapshot endpoint verified.")
          PY

      - name: Send Telegram daily status or weekly rebalance alert
        if: ${{ github.event_name == 'schedule' || github.event.inputs.notify_broadcast == 'true' }}
        run: |
          curl --fail --silent --show-error \
            -X POST \
            -H "Authorization: Bearer $BOT_NOTIFY_TOKEN" \
            https://autostock-telegram-bot.th07290828.workers.dev/api/notify
        env:
          BOT_NOTIFY_TOKEN: ${{ secrets.BOT_NOTIFY_TOKEN }}
